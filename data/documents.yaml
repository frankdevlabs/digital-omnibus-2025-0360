      package (Am 269-292, 296) rewrites the ENISA "single-entry point" for incident reporting into
      an optional "interoperable European framework" that preserves national reporting channels
      across NIS2/DORA/CER/eIDAS, keeping the 96h GDPR breach deadline (Am 251-252). ECR
      (Bocheński/Złotowski) and PfE (Diepeveen/Piera) amendments pull the other way — narrowing
      personal-data scope, adding SME refusal grounds on subject requests (Am 245), and adding Art
      88a cookie-consent exemptions for security/continuity/preferences (Am 258-260). Surfaced via
