      PE786.818v01-00; co-rapporteurs Aura Salla (ITRE, EPP) and Marina Kaljurand (LIBE, S&D).
      78 amendments. Amendment-tabling deadline 15 Jul 2026; committee vote expected ~Q4 2026.
      Operative text retrieved 2026-06-26 via the headless-browser AWS-WAF bypass
      (~/law-tracker/lib/fetch_blocked_doc.py; doceo returns HTTP 202 to curl/WebFetch) and
      transcribed to extracts/parliament/CJ72-PR-786818_joint-itre-libe-draft-report.md. Substance:
      the co-rapporteurs substantially walk back the omnibus deregulation — restore the P2B
      Regulation 2019/1150 (Am 77-78 delete its repeal), restore the GDPR Art 22 right not to be
      subject to solely automated decisions and define meaningful human intervention (Am 51, 53),
      reverse the subject-access "abuse" reframing (Am 5, 48, 49), keep scientific-research/further-
      processing but re-anchor it to Art 89 safeguards (Am 2, 3, 45), tighten biometric verification
      (Am 4, 46, 70), shift breach-template/DPIA-list authorship from the Commission back to the
      EDPB (Am 7, 8, 56-67), keep the personal-data-breach notification deadline at 96 hours (Am 54),
      add NIS2 'report-once'/harmonised-application guidance (Am 11, 75, 76), and strengthen Data Act
      intermediation, B2G-emergency, third-country-access transparency and open-data safeguards
      (Am 13-42). Surfaced via triage #88 (docs/triage/2026-06-26-issue-88.md).

