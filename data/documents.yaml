      amendment-deadline (26 Jun 2026) tablings, NOT the rapporteur's own text and NOT an adopted
      committee position — the JURI vote is expected ~Q4 2026. Ten tablers/groups: David Cormand
      (Greens), Arash Saeidi (The Left), Laurence Farreng (Renew), Daniel Buda / Emil Radev / Mario
      Mantovani / Victor Negrescu (EPP & S&D), Tobiasz Bocheński & Kosma Złotowski (ECR), Ton
      Diepeveen & Pascale Piera (PfE), plus one Benifei amendment. Operative text retrieved
      2026-07-07 via the headless-browser AWS-WAF bypass (~/law-tracker/lib/fetch_blocked_doc.py;
      doceo returns HTTP 202 to curl/WebFetch) and transcribed to
      extracts/parliament/JURI-AM-790236_amendments.md. Substance (competing MEP amendments, not a
      settled line): Greens/Left/Renew amendments largely reinforce the draft opinion's reversal of
      the deregulation — delete the omnibus's new trade-secret recitals, keep smart contracts (Am
      197, Data Act Art 36), restore Data Act Chapter V/cloud-switching, delete the GDPR Art 4(1)
      non-personal-data clarification (Am 232-233), delete the Art 41a pseudonymisation implementing-
      act route (Am 256-257, 267), delete the Art 88c AI legitimate-interest ground (Am 262-265) and
