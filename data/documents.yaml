      Opinion of the European Central Bank of 10 March 2026, requested by the European Parliament on
      9 December 2025 (competence under Arts 127(4) and 282(5) TFEU). The ECB broadly supports the
      proposal as a simplification of the digital rulebook, with observations relevant to monetary
      policy, payment systems, prudential supervision and statistics. Committed copy from the ECB
      website; reached the Council via cover note ST 7244/26. Digest in docs/advisory/ecb-con-2026-9.md.
      Notable ask: exclude DORA from the single-entry-point regime (at least initially).

