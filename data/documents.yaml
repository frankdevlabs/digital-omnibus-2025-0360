  - id: ah-1255667
    title: "Kamervragen (lid Van de Sanden, Eerste Kamer) over de inzet van de omnibusprocedure en het ontbreken van effectbeoordelingen — antwoord"
    body: Eerste Kamer
    date: 2026-06-23
    limite: false
    access: public-via-national-parliament
    url: https://zoek.officielebekendmakingen.nl/ah-1255667.html
    notes: >-
      Aanhangsel AH 10 (Eerste Kamer, vergaderjaar 2025-2026); written questions by lid Van de Sanden
      announced 2 Jun 2026, answered 23 Jun 2026 by the minister van Buitenlandse Zaken mede namens de
      minister van Economische Zaken en Klimaat. In-scope (Digitale Omnibus / 2025/0360, alongside
      Omnibus AI). Cabinet on record: none of the ten omnibus packages since 26 Feb 2025 carried a
      Commission impact assessment (A3); it has repeatedly pressed for one since the Antici Group on
      Simplification first discussed the AI + Digital omnibus on 21 Nov 2025 — orally and in writing, and
      via the 8 Apr non-paper (NL-NONPAPER-2026-04-08) — but lacks Council support to compel one (A4);
      shares the EDPB-EDPS JO 2/2026 regret that a full impact assessment is missing and fundamental-rights
      effects under-weighed (A6); the Omnibus Digitaal krachtenveld is still developing, with positive
      signals on the cabinet's main concerns (A4). Legal view: using an omnibus procedure without an impact
      assessment is not in itself unlawful — no CJEU obligation to do one in all cases (C-482/17 Czech
      Republic v Parliament and Council; C-541/20 a.o. Lithuania v Parliament and Council) — so no ground to
      treat the resulting regulation as void (A8); declines a Raad van State advisory opinion (A10).
      References the Danish Folketing EU-committee letter of 8 May 2026 to Dombrovskis (14 of 64 key
      proposals had an IA) and the Commission's COM(2026) 380 Better-Regulation communication. Cite-by-URL
      (no committed PDF), mirroring ah-tk-20252026-792. Summary in docs/member-state-positions.md
      (Netherlands section).
