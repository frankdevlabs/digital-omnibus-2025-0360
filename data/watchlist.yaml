# Tracker watchlist for file 2025/0360 (COD).
#
# Maps each tracker code (T1-*/T2-*/T3-*, as used in data/tracker-state.yaml and
# in the "[tracker] ..." GitHub issues) to its watched source and the downstream
# analysis docs to review when it produces a hit. This mirrors the source table
# in the daily-tracker cron prompt (~/law-tracker/prompt.md), which is the only
# other place the mapping lives — keep the two in sync when sources change.
#
# Consumed by .claude/skills/resolve-tracker-issue (tracker_issues.py joins each
# flagged issue to its `affects` list so the resolver knows what to integrate).
#
# Fields per source:
#   tier        T1 | T2 | T3
#   kind        institutional | stakeholder | social
#   label       human-readable source name (matches the issue body "**Source:**")
#   url         watched URL (T1/T2); omitted for T3 (Bluesky uses handle/did)
#   handle/did  Bluesky actor (T3 only)
#   document_id optional join to data/documents.yaml (when the source IS a doc)
#   affects     downstream files/dirs to review on a substantive hit. Directories
#               (extracts/council/, docs/provisions/) mean "the relevant file(s)
#               within" — the resolver picks the specific provision by topic.
#   notes       fetch quirks / scope rules carried over from the cron prompt

sources:
